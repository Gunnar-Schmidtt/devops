<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Since Tracker</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .main-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 {
      text-align: center;
      color: #2d3a4b;
      margin-bottom: 32px;
    }
    .timer-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      margin-bottom: 32px;
      align-items: end;
    }
    .timer-form label {
      font-weight: 600;
      margin-bottom: 4px;
      color: #2d3a4b;
    }
    .timer-form input, .timer-form textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #cfd8dc;
      border-radius: 4px;
      font-size: 15px;
      background: #f8fafc;
      margin-bottom: 8px;
      resize: none;
    }
    .timer-form textarea {
      min-height: 38px;
      max-height: 80px;
    }
    .timer-form button {
      grid-column: 1 / -1;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 12px 0;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .timer-form button:hover {
      background: #125ea2;
    }
    .timers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    .timer-card {
      background: #f8fafc;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 20px 18px 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
      min-height: 160px;
    }
    .timer-label {
      font-size: 1.1em;
      font-weight: 600;
      color: #1976d2;
      margin-bottom: 6px;
    }
    .timer-desc {
      color: #444;
      font-size: 0.98em;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .timer-since {
      font-size: 1.3em;
      font-weight: 700;
      color: #2d3a4b;
      margin-bottom: 6px;
    }
    .timer-date {
      font-size: 0.93em;
      color: #888;
      margin-bottom: 2px;
    }
    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .remove-btn:hover {
      background: #b71c1c;
    }
    @media (max-width: 600px) {
      .main-container {
        padding: 8px;
      }
      .timer-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <h1>Time Since Tracker</h1>
    <form class="timer-form" id="timerForm" autocomplete="off">
      <div>
        <label for="date">Date</label>
        <input type="date" id="date" required>
      </div>
      <div>
        <label for="time">Time</label>
        <input type="time" id="time" required>
      </div>
      <div>
        <label for="label">Label</label>
        <input type="text" id="label" maxlength="40" required placeholder="e.g. Project Launch">
      </div>
      <div>
        <label for="desc">Description</label>
        <textarea id="desc" maxlength="120" placeholder="Optional description..."></textarea>
      </div>
      <button type="submit">Add Timer Card</button>
    </form>
    <div class="timers-grid" id="timersGrid"></div>
  </div>

  <script>
    // Timer card logic
    const timerForm = document.getElementById('timerForm');
    const timersGrid = document.getElementById('timersGrid');
    let timers = [];

    function pad(n) { return n < 10 ? '0' + n : n; }

    function formatDuration(ms) {
      if (ms < 0) return 'Not started';
      const s = Math.floor(ms / 1000) % 60;
      const m = Math.floor(ms / 60000) % 60;
      const h = Math.floor(ms / 3600000) % 24;
      const d = Math.floor(ms / 86400000);
      let out = '';
      if (d > 0) out += d + 'd ';
      out += pad(h) + ':' + pad(m) + ':' + pad(s);
      return out;
    }

    function renderTimers() {
      timersGrid.innerHTML = '';
      timers.forEach((timer, idx) => {
        const card = document.createElement('div');
        card.className = 'timer-card';
        card.innerHTML = `
          <button class="remove-btn" title="Remove" onclick="removeTimer('${timer._id}')">&times;</button>
          <div class="timer-label">${timer.label}</div>
          <div class="timer-desc">${timer.desc ? timer.desc : ''}</div>
          <div class="timer-date">${timer.dateStr} ${timer.timeStr}</div>
          <div class="timer-since" id="since-${timer._id}">${formatDuration(Date.now() - timer.startTime)}</div>
        `;
        timersGrid.appendChild(card);
      });
    }

    function updateTimers() {
      timers.forEach((timer) => {
        const el = document.getElementById('since-' + timer._id);
        if (el) {
          el.textContent = formatDuration(Date.now() - timer.startTime);
        }
      });
    }

    async function loadTimers() {
      try {
        const res = await fetch('/api/timers');
        const data = await res.json();
        // Convert startTime to number if needed
        timers = data.map(t => ({ ...t, startTime: typeof t.startTime === 'number' ? t.startTime : Number(t.startTime) }));
        renderTimers();
      } catch (e) {
        timersGrid.innerHTML = '<div style="color:red">Failed to load timers</div>';
      }
    }

    window.removeTimer = async function(id) {
      if (!confirm('Delete this timer?')) return;
      try {
        await fetch('/api/timers/' + id, { method: 'DELETE' });
        await loadTimers();
      } catch (e) {
        alert('Failed to delete timer');
      }
    };

    timerForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const label = document.getElementById('label').value.trim();
      const desc = document.getElementById('desc').value.trim();
      if (!date || !time || !label) return;
      const startTime = new Date(date + 'T' + time).getTime();
      const dateStr = date;
      const timeStr = time;
      try {
        await fetch('/api/timers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ startTime, label, desc, dateStr, timeStr })
        });
        await loadTimers();
        timerForm.reset();
      } catch (e) {
        alert('Failed to add timer');
      }
    });

    // Initial load
    loadTimers();
    // Update all timers every second
    setInterval(updateTimers, 1000);
  </script>
</body>
</html>
